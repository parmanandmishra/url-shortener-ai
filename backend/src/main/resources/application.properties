spring.application.name=backend

# Datasource
spring.datasource.url=jdbc:h2:mem:urlshortener
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# H2 console (development only)
spring.h2.console.enabled=true

# Disable JMX - not required; prevents LocalRMIServerSocketFactory warnings
# when IDE or external tools attempt remote JMX connections
spring.jmx.enabled=false

# Actuator - expose only the health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Include request correlation id in logs (populated by RequestCorrelationFilter)
logging.pattern.level=%5p [reqId:%X{requestId:-na}]
